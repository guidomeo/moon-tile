<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogiGolf</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url("img/Background.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .video-wrapper {
            width: 80vw;
            max-width: 960px;
            aspect-ratio: 16 / 9;

            border: 3px solid black;

            box-shadow: 0 0 15px rgba(0, 0, 0, 0.9);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <iframe
            src="https://www.youtube.com/embed/tJxt_bCwrCM"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope;"
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
